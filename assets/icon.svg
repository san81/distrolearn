<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#0D1F4E"/>
      <stop offset="100%" stop-color="#060C1E"/>
    </radialGradient>

    <!-- Center node glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4AB3FF" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#1A6FD4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A3A80" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Teal node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1EE8C0" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#0BBFA0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#066B59" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Outer glow filter for nodes -->
    <filter id="glowNode" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow filter for center -->
    <filter id="glowCenter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arc glow filter -->
    <filter id="glowArc" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft inner shadow on background circle -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip to circle for Android -->
    <clipPath id="circleClip">
      <circle cx="512" cy="512" r="500"/>
    </clipPath>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="512" cy="512" r="500" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring on bg -->
  <circle cx="512" cy="512" r="420"
    fill="none" stroke="#1A3A7A" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="512" cy="512" r="370"
    fill="none" stroke="#1A3A7A" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ── Node positions ──
       Top:          512, 195
       Bottom-left:  265, 670
       Bottom-right: 759, 670
  -->

  <!-- ── Connecting arcs (behind nodes) ── -->
  <!-- Top → Bottom-right arc -->
  <path d="M 512 195 Q 720 380 759 670"
    fill="none" stroke="#1EE8C0" stroke-width="3.5" stroke-opacity="0.55"
    stroke-linecap="round" filter="url(#glowArc)"/>

  <!-- Top → Bottom-left arc -->
  <path d="M 512 195 Q 304 380 265 670"
    fill="none" stroke="#1EE8C0" stroke-width="3.5" stroke-opacity="0.55"
    stroke-linecap="round" filter="url(#glowArc)"/>

  <!-- Bottom-left → Bottom-right arc (curves up slightly) -->
  <path d="M 265 670 Q 512 600 759 670"
    fill="none" stroke="#1EE8C0" stroke-width="3.5" stroke-opacity="0.55"
    stroke-linecap="round" filter="url(#glowArc)"/>

  <!-- ── Lines from nodes to center ── -->
  <line x1="512" y1="195" x2="512" y2="430"
    stroke="#4AB3FF" stroke-width="2.5" stroke-opacity="0.5"
    stroke-linecap="round" filter="url(#glowArc)"/>
  <line x1="265" y1="670" x2="440" y2="560"
    stroke="#4AB3FF" stroke-width="2.5" stroke-opacity="0.5"
    stroke-linecap="round" filter="url(#glowArc)"/>
  <line x1="759" y1="670" x2="584" y2="560"
    stroke="#4AB3FF" stroke-width="2.5" stroke-opacity="0.5"
    stroke-linecap="round" filter="url(#glowArc)"/>

  <!-- ── Outer glow halos for teal nodes ── -->
  <circle cx="512" cy="195" r="70" fill="#1EE8C0" fill-opacity="0.12"/>
  <circle cx="265" cy="670" r="70" fill="#1EE8C0" fill-opacity="0.12"/>
  <circle cx="759" cy="670" r="70" fill="#1EE8C0" fill-opacity="0.12"/>

  <!-- ── Teal nodes ── -->
  <circle cx="512" cy="195" r="42" fill="url(#nodeGlow)" filter="url(#glowNode)"/>
  <circle cx="512" cy="195" r="28" fill="#1EE8C0"/>

  <circle cx="265" cy="670" r="42" fill="url(#nodeGlow)" filter="url(#glowNode)"/>
  <circle cx="265" cy="670" r="28" fill="#1EE8C0"/>

  <circle cx="759" cy="670" r="42" fill="url(#nodeGlow)" filter="url(#glowNode)"/>
  <circle cx="759" cy="670" r="28" fill="#1EE8C0"/>

  <!-- ── Center node: outer glow halo ── -->
  <circle cx="512" cy="510" r="150" fill="#1A6FD4" fill-opacity="0.18"/>
  <circle cx="512" cy="510" r="120" fill="#1A6FD4" fill-opacity="0.22"/>

  <!-- Center ring -->
  <circle cx="512" cy="510" r="105"
    fill="none" stroke="#4AB3FF" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Center filled circle -->
  <circle cx="512" cy="510" r="95" fill="url(#centerGlow)" filter="url(#glowCenter)"/>

  <!-- ── DL text ── -->
  <text x="512" y="548"
    font-family="Arial, Helvetica, sans-serif"
    font-size="88"
    font-weight="900"
    font-style="italic"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-4"
    filter="url(#glowCenter)">DL</text>
</svg>
